<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMS Master Control</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --accent: #00d2ff;
            --accent-alt: #a29bfe;
            --danger: #ff4757;
            --warning: #ffa502;
            --success: #2ed573;
            --border: #333333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        h1, h2, h3 { margin-top: 0; }

        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding-bottom: 20px; border-bottom: 1px solid var(--border); margin-bottom: 20px;
        }
        .nav-btn {
            background-color: transparent;
            color: var(--accent);
            border: 1px solid var(--accent);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            text-decoration: none;
            font-weight: bold;
            transition: 0.2s;
            font-size: 14px;
        }

        .nav-btn:hover { background-color: var(--accent); color: black; }

        .status-badge {
            padding: 8px 16px; border-radius: 20px; background-color: var(--success);
            color: black; font-weight: bold;
        }

        .dashboard-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; flex-grow: 1; }
        .panel { background-color: var(--panel-bg); border-radius: 10px; padding: 20px; border: 1px solid var(--border); }

        /* Stats Grid */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .stat-box { background-color: #2a2a2a; padding: 15px; border-radius: 8px; text-align: center; }
        .stat-value { font-size: 22px; font-weight: bold; color: var(--accent); margin: 10px 0 5px 0; }
        .stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; }

        /* Preset Buttons */
        .preset-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        button { background-color: #2a2a2a; color: var(--text-main); border: 1px solid var(--border); padding: 10px; border-radius: 6px; cursor: pointer; transition: all 0.2s; font-weight: 600; font-size: 13px; }
        button:hover { background-color: #3a3a3a; border-color: var(--accent); }
        button.btn-danger:hover { background-color: var(--danger); color: white; border-color: var(--danger); }
        button.btn-warning:hover { background-color: var(--warning); color: black; border-color: var(--warning); }
        button.btn-success:hover { background-color: var(--success); color: black; border-color: var(--success); }

        /* Custom Sliders */
        .custom-sliders { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .slider-group { display: flex; flex-direction: column; background: #2a2a2a; padding: 10px; border-radius: 6px; }
        .slider-group label { font-size: 12px; color: var(--accent); display: flex; justify-content: space-between; margin-bottom: 5px; font-weight: bold;}
        .slider-group span { color: white; }
        input[type=range] { width: 100%; cursor: pointer; }
        select { width: 100%; padding: 5px; background: #121212; color: white; border: 1px solid var(--border); border-radius: 4px;}

        /* Charts */
        .charts-wrapper { display: flex; flex-direction: column; gap: 20px; }
        .chart-container { height: 250px; background-color: #2a2a2a; border-radius: 8px; padding: 10px; position: relative; }
    </style>
</head>
<body>

    <div class="header">
        <h1>BMS Master Control</h1>
        <div style="display: flex; gap: 15px; align-items: center;">
            <a href="/history" class="nav-btn">View Historical Data</a>
            <div class="status-badge" id="conn-status">MQTT Connected</div>
        </div>
    </div>

    <div class="dashboard-grid">
        <div class="panel">
            <h2>Live Telemetry</h2>
            
            <div class="stats-grid">
                <div class="stat-box"><div class="stat-label">Pack Voltage</div><div class="stat-value" id="val-pack">0.00 V</div></div>
                <div class="stat-box"><div class="stat-label">Current</div><div class="stat-value" id="val-current">0.00 A</div></div>
                <div class="stat-box"><div class="stat-label">State of Charge</div><div class="stat-value" id="val-soc" style="color: var(--success);">0.0 %</div></div>
                <div class="stat-box"><div class="stat-label">Temp 1</div><div class="stat-value" id="val-t1" style="color: var(--warning);">0.0 °C</div></div>
                <div class="stat-box"><div class="stat-label">Temp 2</div><div class="stat-value" id="val-t2" style="color: var(--warning);">0.0 °C</div></div>
                <div class="stat-box"><div class="stat-label">Charger</div><div class="stat-value" id="val-chg">OFF</div></div>
            </div>

            <div class="charts-wrapper">
                <div class="chart-container"><canvas id="voltageChart"></canvas></div>
                <div class="chart-container" style="height: 180px;"><canvas id="socChart"></canvas></div>
            </div>
        </div>

        <div class="panel">
            <h2>Test Bench Presets</h2>
<div class="preset-grid">
                <button class="btn-success" onclick="sendCommand('preset', 'normal_idle')">Normal Idle (3.9V)</button>
                <button class="btn-success" onclick="sendCommand('preset', 'normal_charge')">Normal Charging (-5A)</button>
                <button class="btn-success" style="grid-column: span 2;" onclick="sendCommand('preset', 'normal_discharge')">Normal Discharging (15A)</button>
                
                <button class="btn-warning" onclick="sendCommand('preset', 'fault_imbalance')">Cell 3 Imbalance</button>
                <button class="btn-warning" onclick="sendCommand('preset', 'deep_discharge')">50A Heavy Load</button>

                <button class="btn-danger" onclick="sendCommand('preset', 'fault_ov')">Trigger Overvoltage</button>
                <button class="btn-danger" onclick="sendCommand('preset', 'fault_uv')">Trigger Undervoltage</button>
                <button class="btn-danger" onclick="sendCommand('preset', 'fault_ot')">Trigger Overtemp</button>
                <button class="btn-danger" onclick="sendCommand('preset', 'extreme_cold')">Trigger Under-temp</button>
                
                <button style="grid-column: span 2; margin-top: 10px; border-color: var(--accent);" onclick="sendCommand('raw', 'RESET')">
                    ⟲ HARD RESET ESP32 FAULTS
                </button>
            </div>

            <hr style="border-color: var(--border); margin: 20px 0;">

            <h2>Custom Simulator</h2>
            <div class="custom-sliders">
                <div class="slider-group"><label>Cell 1 (V) <span id="out-v1">3.90</span></label><input type="range" id="sim-v1" min="2.0" max="4.5" step="0.01" value="3.9" oninput="updateVal(this, 'out-v1')"></div>
                <div class="slider-group"><label>Cell 2 (V) <span id="out-v2">3.90</span></label><input type="range" id="sim-v2" min="2.0" max="4.5" step="0.01" value="3.9" oninput="updateVal(this, 'out-v2')"></div>
                <div class="slider-group"><label>Cell 3 (V) <span id="out-v3">3.90</span></label><input type="range" id="sim-v3" min="2.0" max="4.5" step="0.01" value="3.9" oninput="updateVal(this, 'out-v3')"></div>
                <div class="slider-group"><label>Cell 4 (V) <span id="out-v4">3.90</span></label><input type="range" id="sim-v4" min="2.0" max="4.5" step="0.01" value="3.9" oninput="updateVal(this, 'out-v4')"></div>
                
                <div class="slider-group"><label>Current (A) <span id="out-c">0.0</span></label><input type="range" id="sim-c" min="-100" max="100" step="0.1" value="0.0" oninput="updateVal(this, 'out-c')"></div>
                <div class="slider-group"><label>Temp 1 (°C) <span id="out-t1">25.0</span></label><input type="range" id="sim-t1" min="-20" max="85" step="1" value="25" oninput="updateVal(this, 'out-t1')"></div>
                
                <div class="slider-group"><label>Temp 2 (°C) <span id="out-t2">25.0</span></label><input type="range" id="sim-t2" min="-20" max="85" step="1" value="25" oninput="updateVal(this, 'out-t2')"></div>
                <div class="slider-group"><label>Charger</label>
                    <select id="sim-chg">
                        <option value="0">Disconnected</option>
                        <option value="1">Connected</option>
                    </select>
                </div>
            </div>
            <button style="width: 100%; border-color: var(--accent-alt); background: var(--border);" onclick="sendCustom()">🚀 SEND CUSTOM STATE</button>
        </div>
    </div>

    <script>
        // --- CHART SETUP ---
        const maxDataPoints = 30; 
        
        // Voltage Chart
        const ctxVolt = document.getElementById('voltageChart').getContext('2d');
        const chartVolt = new Chart(ctxVolt, {
            type: 'line',
            data: {
                labels: [], 
                datasets: [
                    { label: 'Cell 1', borderColor: '#ff4757', data: [], tension: 0.3, pointRadius: 0 },
                    { label: 'Cell 2', borderColor: '#2ed573', data: [], tension: 0.3, pointRadius: 0 },
                    { label: 'Cell 3', borderColor: '#1e90ff', data: [], tension: 0.3, pointRadius: 0 },
                    { label: 'Cell 4', borderColor: '#ffa502', data: [], tension: 0.3, pointRadius: 0 }
                ]
            },
            options: { responsive: true, maintainAspectRatio: false, animation: false, scales: { y: { min: 2.0, max: 4.5, grid: { color: '#444' } }, x: { grid: { color: '#444' } } }, plugins: { legend: { labels: { color: '#fff' } } } }
        });

        // SoC Chart
        const ctxSoc = document.getElementById('socChart').getContext('2d');
        const chartSoc = new Chart(ctxSoc, {
            type: 'line',
            data: { labels: [], datasets: [{ label: 'State of Charge (%)', borderColor: '#a29bfe', backgroundColor: 'rgba(162, 155, 254, 0.2)', fill: true, data: [], tension: 0.3, pointRadius: 0 }] },
            options: { responsive: true, maintainAspectRatio: false, animation: false, scales: { y: { min: 0, max: 100, grid: { color: '#444' } }, x: { display: false } }, plugins: { legend: { labels: { color: '#fff' } } } }
        });

        // --- UI UPDATER ---
        function updateDashboard() {
            fetch('/api/telemetry')
                .then(response => response.json())
                .then(data => {
                    if (Object.keys(data).length === 0) return;

                    let packV = (data.v1 + data.v2 + data.v3 + data.v4).toFixed(2);
                    document.getElementById('val-pack').innerText = packV + ' V';
                    document.getElementById('val-current').innerText = data.current.toFixed(2) + ' A';
                    document.getElementById('val-soc').innerText = data.soc.toFixed(1) + ' %';
                    document.getElementById('val-t1').innerText = data.t1.toFixed(1) + ' °C';
                    document.getElementById('val-t2').innerText = data.t2.toFixed(1) + ' °C';
                    document.getElementById('val-chg').innerText = data.charger ? "CONNECTED" : "OFF";
                    document.getElementById('val-chg').style.color = data.charger ? "var(--success)" : "var(--text-muted)";

                    const now = new Date().toLocaleTimeString('en-US', { hour12: false, hour: "numeric", minute: "numeric", second: "numeric" });
                    
                    // Update Voltage Chart
                    chartVolt.data.labels.push(now);
                    chartVolt.data.datasets[0].data.push(data.v1);
                    chartVolt.data.datasets[1].data.push(data.v2);
                    chartVolt.data.datasets[2].data.push(data.v3);
                    chartVolt.data.datasets[3].data.push(data.v4);
                    if (chartVolt.data.labels.length > maxDataPoints) { chartVolt.data.labels.shift(); chartVolt.data.datasets.forEach(d => d.data.shift()); }
                    chartVolt.update();

                    // Update SoC Chart
                    chartSoc.data.labels.push(now);
                    chartSoc.data.datasets[0].data.push(data.soc);
                    if (chartSoc.data.labels.length > maxDataPoints) { chartSoc.data.labels.shift(); chartSoc.data.datasets[0].data.shift(); }
                    chartSoc.update();

                    const badge = document.getElementById('conn-status');
                    if (data.faults > 0) {
                        badge.style.backgroundColor = 'var(--danger)'; badge.style.color = 'white'; badge.innerText = 'FAULT: 0x' + data.faults.toString(16).toUpperCase();
                    } else {
                        badge.style.backgroundColor = 'var(--success)'; badge.style.color = 'black'; badge.innerText = 'SYSTEM NORMAL';
                    }
                })
                .catch(err => console.log("Waiting for data..."));
        }
        setInterval(updateDashboard, 1000);

        // --- COMMANDS ---
        function sendCommand(type, action) {
            fetch('/api/command', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ type: type, action: action }) });
        }

        // Custom Slider Logic
        function updateVal(slider, textId) {
            document.getElementById(textId).innerText = parseFloat(slider.value).toFixed(slider.step < 1 ? 2 : 1);
        }

        function sendCustom() {
            const customState = {
                v1: parseFloat(document.getElementById('sim-v1').value),
                v2: parseFloat(document.getElementById('sim-v2').value),
                v3: parseFloat(document.getElementById('sim-v3').value),
                v4: parseFloat(document.getElementById('sim-v4').value),
                c: parseFloat(document.getElementById('sim-c').value),
                t1: parseFloat(document.getElementById('sim-t1').value),
                t2: parseFloat(document.getElementById('sim-t2').value),
                charger: parseInt(document.getElementById('sim-chg').value)
            };
            sendCommand('custom', customState);
        }
    </script>
</body>
</html>
