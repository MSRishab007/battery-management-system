<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battery Management System Dashboard and Controller</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* Sleek Modern "Slate" Color Palette */
        :root {
            --bg-color: #0f172a;        /* Deep slate background */
            --panel-bg: #1e293b;        /* Lighter slate for panels */
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;          /* Light blue */
            --accent-alt: #818cf8;      /* Indigo */
            --danger: #f43f5e;          /* Rose red */
            --warning: #fbbf24;         /* Amber */
            --success: #10b981;         /* Emerald green */
            --border: #334155;
        }
        /* Number Input Styling */
        input[type=number] {
            width: 65px;
            background: var(--bg-color);
            color: var(--accent);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 4px 6px;
            text-align: right;
            font-weight: bold;
            font-family: monospace;
            font-size: 13px;
        }
        input[type=number]:focus { outline: none; border-color: var(--accent); }
        
        /* Remove the up/down arrows from number inputs for a cleaner look */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        h1, h2, h3 { margin-top: 0; font-weight: 600; letter-spacing: 0.5px; }
        h2 { font-size: 1.25rem; margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 10px;}

        /* Header Navigation */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding-bottom: 15px; margin-bottom: 20px;
        }

        .header h1 { margin: 0; color: var(--text-main); text-shadow: 0 2px 4px rgba(0,0,0,0.3); }

        .nav-btn {
            background-color: transparent; color: var(--accent);
            border: 1px solid var(--accent); padding: 8px 16px;
            border-radius: 8px; cursor: pointer; text-decoration: none;
            font-weight: 600; transition: all 0.2s ease; font-size: 14px;
        }
        .nav-btn:hover { background-color: var(--accent); color: #000; box-shadow: 0 0 10px rgba(56, 189, 248, 0.3); }

        .status-badge {
            padding: 8px 16px; border-radius: 8px; background-color: var(--success);
            color: white; font-weight: bold; font-size: 14px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            letter-spacing: 0.5px;
        }

        /* Grid Layout */
        .dashboard-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; flex-grow: 1; }
        .panel { 
            background-color: var(--panel-bg); border-radius: 12px; padding: 25px; 
            border: 1px solid var(--border); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3); 
        }

        /* Stats Grid - Widened minmax to fix overflow */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-box { 
            background-color: var(--bg-color); padding: 15px 10px; border-radius: 10px; 
            text-align: center; border: 1px solid var(--border);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }
        .stat-value { font-size: 20px; font-weight: bold; color: var(--accent); margin: 8px 0 2px 0; }
        .stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }

        /* Modern Outline Buttons */
        .preset-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px; }
        button { 
            background-color: transparent; border: 1px solid var(--border); padding: 12px; 
            border-radius: 8px; cursor: pointer; transition: all 0.2s ease; 
            font-weight: 600; font-size: 13px; color: var(--text-main);
        }
        
        button.btn-success { border-color: var(--success); color: var(--success); }
        button.btn-success:hover { background-color: var(--success); color: #fff; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2); }
        
        button.btn-warning { border-color: var(--warning); color: var(--warning); }
        button.btn-warning:hover { background-color: var(--warning); color: #000; box-shadow: 0 4px 12px rgba(251, 191, 36, 0.2); }
        
        button.btn-danger { border-color: var(--danger); color: var(--danger); }
        button.btn-danger:hover { background-color: var(--danger); color: #fff; box-shadow: 0 4px 12px rgba(244, 63, 94, 0.2); }

        button.btn-reset { border-color: var(--accent); color: var(--accent); grid-column: span 2; margin-top: 5px; }
        button.btn-reset:hover { background-color: var(--accent); color: #000; box-shadow: 0 4px 12px rgba(56, 189, 248, 0.3); }

        button.btn-submit { background-color: var(--accent-alt); color: #fff; border: none; width: 100%; padding: 14px; font-size: 14px; margin-top: 10px; }
        button.btn-submit:hover { background-color: #6366f1; box-shadow: 0 4px 12px rgba(129, 140, 248, 0.4); }

        /* Custom Sliders */
        .custom-sliders { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .slider-group { display: flex; flex-direction: column; background: var(--bg-color); padding: 12px; border-radius: 8px; border: 1px solid var(--border); }
        .slider-group label { font-size: 12px; color: var(--text-muted); display: flex; justify-content: space-between; margin-bottom: 8px; font-weight: 600;}
        .slider-group span { color: var(--accent); font-weight: bold; }
        
        input[type=range] { width: 100%; cursor: pointer; accent-color: var(--accent); }
        select { width: 100%; padding: 6px; background: var(--bg-color); color: white; border: 1px solid var(--border); border-radius: 4px; outline: none;}
        select:focus { border-color: var(--accent); }

        /* Charts */
        .charts-wrapper { display: flex; flex-direction: column; gap: 20px; }
        .chart-container { height: 260px; background-color: var(--bg-color); border-radius: 10px; padding: 15px; border: 1px solid var(--border); }
    </style>
</head>
<body>

    <div class="header">
        <h1>Battery Management System Dashboard</h1>
        <div style="display: flex; gap: 15px; align-items: center;">
            <a href="/history" class="nav-btn">View Historical Data</a>
            <div class="status-badge" id="conn-status">MQTT Connected</div>
        </div>
    </div>

    <div class="dashboard-grid">
        <div class="panel">
            <h2>Live Telemetry</h2>
            
            <div class="stats-grid">
                <div class="stat-box"><div class="stat-label">Pack Voltage</div><div class="stat-value" id="val-pack">0.00 V</div></div>
                <div class="stat-box"><div class="stat-label">Current</div><div class="stat-value" id="val-current">0.00 A</div></div>
                <div class="stat-box"><div class="stat-label">State of Charge</div><div class="stat-value" id="val-soc" style="color: var(--success);">0.0 %</div></div>
                <div class="stat-box"><div class="stat-label">Temp 1</div><div class="stat-value" id="val-t1" style="color: var(--warning);">0.0 °C</div></div>
                <div class="stat-box"><div class="stat-label">Temp 2</div><div class="stat-value" id="val-t2" style="color: var(--warning);">0.0 °C</div></div>
                <div class="stat-box"><div class="stat-label">Charger</div><div class="stat-value" id="val-chg">OFF</div></div>
            </div>

            <div class="charts-wrapper">
                <div class="chart-container"><canvas id="voltageChart"></canvas></div>
                <div class="chart-container" style="height: 180px;"><canvas id="socChart"></canvas></div>
            </div>
        </div>

        <div class="panel">
            <h2>Test Bench Presets</h2>
            <div class="preset-grid">
                <button class="btn-success" onclick="sendCommand('preset', 'normal_idle')">Idle (3.9V)</button>
                <button class="btn-success" onclick="sendCommand('preset', 'storage_mode')">Storage (3.8V)</button>
                <button class="btn-success" onclick="sendCommand('preset', 'normal_charge')">Charging (5A)</button>
                <button class="btn-success" onclick="sendCommand('preset', 'normal_discharge')">Discharging (-15A)</button>

                <button class="btn-warning" onclick="sendCommand('preset', 'fault_imbalance')">Cell 3 Imbalance</button>
                <button class="btn-warning" onclick="sendCommand('preset', 'deep_discharge')">50A Heavy Load</button>

                <button class="btn-danger" onclick="sendCommand('preset', 'fault_ov')">Trigger Overvoltage</button>
                <button class="btn-danger" onclick="sendCommand('preset', 'fault_uv')">Trigger Undervoltage</button>
                <button class="btn-danger" onclick="sendCommand('preset', 'fault_ot')">Trigger Overtemp</button>
                <button class="btn-danger" onclick="sendCommand('preset', 'extreme_cold')">Trigger Under-temp</button>
                
                <button class="btn-reset" onclick="sendCommand('raw', 'RESET')">⟲ HARD RESET ESP32 FAULTS</button>
            </div>

            <h2>Custom Simulator</h2>
            <div class="custom-sliders">
                <div class="slider-group">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                        <label style="margin: 0;">Cell 1 (V)</label>
                        <input type="number" id="num-v1" min="2.0" max="4.5" step="0.01" value="3.90" oninput="syncVal('num-v1', 'sim-v1')">
                    </div>
                    <input type="range" id="sim-v1" min="2.0" max="4.5" step="0.01" value="3.90" oninput="syncVal('sim-v1', 'num-v1')">
                </div>
                
                <div class="slider-group">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                        <label style="margin: 0;">Cell 2 (V)</label>
                        <input type="number" id="num-v2" min="2.0" max="4.5" step="0.01" value="3.90" oninput="syncVal('num-v2', 'sim-v2')">
                    </div>
                    <input type="range" id="sim-v2" min="2.0" max="4.5" step="0.01" value="3.90" oninput="syncVal('sim-v2', 'num-v2')">
                </div>

                <div class="slider-group">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                        <label style="margin: 0;">Cell 3 (V)</label>
                        <input type="number" id="num-v3" min="2.0" max="4.5" step="0.01" value="3.90" oninput="syncVal('num-v3', 'sim-v3')">
                    </div>
                    <input type="range" id="sim-v3" min="2.0" max="4.5" step="0.01" value="3.90" oninput="syncVal('sim-v3', 'num-v3')">
                </div>

                <div class="slider-group">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                        <label style="margin: 0;">Cell 4 (V)</label>
                        <input type="number" id="num-v4" min="2.0" max="4.5" step="0.01" value="3.90" oninput="syncVal('num-v4', 'sim-v4')">
                    </div>
                    <input type="range" id="sim-v4" min="2.0" max="4.5" step="0.01" value="3.90" oninput="syncVal('sim-v4', 'num-v4')">
                </div>
                
                <div class="slider-group">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                        <label style="margin: 0;">Current (A)</label>
                        <input type="number" id="num-c" min="-100" max="100" step="0.1" value="0.0" oninput="syncVal('num-c', 'sim-c')">
                    </div>
                    <input type="range" id="sim-c" min="-100" max="100" step="0.1" value="0.0" oninput="syncVal('sim-c', 'num-c')">
                </div>

                <div class="slider-group">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                        <label style="margin: 0;">Temp 1 (°C)</label>
                        <input type="number" id="num-t1" min="-20" max="85" step="1" value="25" oninput="syncVal('num-t1', 'sim-t1')">
                    </div>
                    <input type="range" id="sim-t1" min="-20" max="85" step="1" value="25" oninput="syncVal('sim-t1', 'num-t1')">
                </div>
                
                <div class="slider-group">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                        <label style="margin: 0;">Temp 2 (°C)</label>
                        <input type="number" id="num-t2" min="-20" max="85" step="1" value="25" oninput="syncVal('num-t2', 'sim-t2')">
                    </div>
                    <input type="range" id="sim-t2" min="-20" max="85" step="1" value="25" oninput="syncVal('sim-t2', 'num-t2')">
                </div>

                <div class="slider-group">
                    <label style="margin-bottom: 9px;">Charger Status</label>
                    <select id="sim-chg">
                        <option value="0">Disconnected</option>
                        <option value="1">Connected</option>
                    </select>
                </div>
            </div>
            <button class="btn-submit" onclick="sendCustom()">SEND CUSTOM STATE TO HARDWARE</button>
        </div>
    </div>

    <script>
        // --- CHART SETUP ---
        Chart.defaults.color = '#94a3b8'; // Global text color for charts
        Chart.defaults.font.family = "'Segoe UI', sans-serif";

        const maxDataPoints = 30; 
        
        // Voltage Chart
        const ctxVolt = document.getElementById('voltageChart').getContext('2d');
        const chartVolt = new Chart(ctxVolt, {
            type: 'line',
            data: {
                labels: [], 
                datasets: [
                    { label: 'Cell 1', borderColor: '#f43f5e', data: [], tension: 0.3, pointRadius: 0, borderWidth: 2 },
                    { label: 'Cell 2', borderColor: '#10b981', data: [], tension: 0.3, pointRadius: 0, borderWidth: 2 },
                    { label: 'Cell 3', borderColor: '#38bdf8', data: [], tension: 0.3, pointRadius: 0, borderWidth: 2 },
                    { label: 'Cell 4', borderColor: '#fbbf24', data: [], tension: 0.3, pointRadius: 0, borderWidth: 2 }
                ]
            },
            options: { responsive: true, maintainAspectRatio: false, animation: false, scales: { y: { min: 2.0, max: 4.5, grid: { color: '#334155' } }, x: { grid: { color: '#334155' } } }, plugins: { legend: { labels: { color: '#f8fafc' } } } }
        });

        // SoC Chart
        const ctxSoc = document.getElementById('socChart').getContext('2d');
        const chartSoc = new Chart(ctxSoc, {
            type: 'line',
            data: { labels: [], datasets: [{ label: 'State of Charge (%)', borderColor: '#818cf8', backgroundColor: 'rgba(129, 140, 248, 0.2)', fill: true, data: [], tension: 0.3, pointRadius: 0, borderWidth: 2 }] },
            options: { responsive: true, maintainAspectRatio: false, animation: false, scales: { y: { min: 0, max: 100, grid: { color: '#334155' } }, x: { display: false } }, plugins: { legend: { labels: { color: '#f8fafc' } } } }
        });

        // --- UI UPDATER ---
        function updateDashboard() {
            fetch('/api/telemetry')
                .then(response => response.json())
                .then(data => {
                    if (Object.keys(data).length === 0) return;

                    let packV = (data.v1 + data.v2 + data.v3 + data.v4).toFixed(2);
                    document.getElementById('val-pack').innerText = packV + ' V';
                    document.getElementById('val-current').innerText = data.current.toFixed(2) + ' A';
                    document.getElementById('val-soc').innerText = data.soc.toFixed(1) + ' %';
                    document.getElementById('val-t1').innerText = data.t1.toFixed(1) + ' °C';
                    document.getElementById('val-t2').innerText = data.t2.toFixed(1) + ' °C';
                    
                    // Fixed the overflow issue by using a shorter word "ACTIVE"
                    document.getElementById('val-chg').innerText = data.charger ? "ACTIVE" : "OFF";
                    document.getElementById('val-chg').style.color = data.charger ? "var(--success)" : "var(--text-muted)";

                    const now = new Date().toLocaleTimeString('en-US', { hour12: false, hour: "numeric", minute: "numeric", second: "numeric" });
                    
                    // Update Voltage Chart
                    chartVolt.data.labels.push(now);
                    chartVolt.data.datasets[0].data.push(data.v1);
                    chartVolt.data.datasets[1].data.push(data.v2);
                    chartVolt.data.datasets[2].data.push(data.v3);
                    chartVolt.data.datasets[3].data.push(data.v4);
                    if (chartVolt.data.labels.length > maxDataPoints) { chartVolt.data.labels.shift(); chartVolt.data.datasets.forEach(d => d.data.shift()); }
                    chartVolt.update();

                    // Update SoC Chart
                    chartSoc.data.labels.push(now);
                    chartSoc.data.datasets[0].data.push(data.soc);
                    if (chartSoc.data.labels.length > maxDataPoints) { chartSoc.data.labels.shift(); chartSoc.data.datasets[0].data.shift(); }
                    chartSoc.update();

                    const badge = document.getElementById('conn-status');
                    if (data.faults > 0) {
                        badge.style.backgroundColor = 'var(--danger)'; badge.style.color = 'white'; badge.innerText = 'FAULT: 0x' + data.faults.toString(16).toUpperCase();
                    } else {
                        badge.style.backgroundColor = 'var(--success)'; badge.style.color = 'white'; badge.innerText = 'SYSTEM NORMAL';
                    }
                })
                .catch(err => console.log("Waiting for data..."));
        }
        setInterval(updateDashboard, 1000);

        // --- COMMANDS ---
        function sendCommand(type, action) {
            fetch('/api/command', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ type: type, action: action }) });
        }

        // Custom Slider Logic
        // Two-way synchronization between slider and number box
        function syncVal(sourceId, targetId) {
            const sourceVal = document.getElementById(sourceId).value;
            document.getElementById(targetId).value = sourceVal;
        }

        function sendCustom() {
            const customState = {
                v1: parseFloat(document.getElementById('sim-v1').value),
                v2: parseFloat(document.getElementById('sim-v2').value),
                v3: parseFloat(document.getElementById('sim-v3').value),
                v4: parseFloat(document.getElementById('sim-v4').value),
                c: parseFloat(document.getElementById('sim-c').value),
                t1: parseFloat(document.getElementById('sim-t1').value),
                t2: parseFloat(document.getElementById('sim-t2').value),
                charger: parseInt(document.getElementById('sim-chg').value)
            };
            sendCommand('custom', customState);
        }
    </script>
</body>
</html>
