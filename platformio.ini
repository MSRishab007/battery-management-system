[env:t-cameras3]
platform = espressif32
framework = arduino
board = esp32s3box
platform_packages = toolchain-riscv32-esp
monitor_port = COM7
monitor_dtr = 1
monitor_rts = 1

board_build.partitions = partitions.csv

upload_speed =  921600
monitor_speed = 115200

; monitor_port = COM94
; upload_port  = COM94

build_flags =
    -DBOARD_HAS_PSRAM       

    ; Enable UARDUINO_ USB_ CDC_ ON_ BOOT will start printing and wait for terminal access during startup
    -DARDUINO_USB_CDC_ON_BOOT=1

    ; Enable UARDUINO_USB_CDC_ON_BOOT will turn off printing and will not block when using the battery
    ; -UARDUINO_USB_CDC_ON_BOOT

    ;Defined using platformio, for AllFunction Examples
    -DPLATFORMIO_ENV
; Libraries
lib_deps =
    lewisxhe/XPowersLib @ ^0.2.1
    olikraus/U8g2 @ ^2.35.7
    knolleary/PubSubClient @ ^2.8

